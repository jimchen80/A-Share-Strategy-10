name: Strategy-V10-Engine

on:
  workflow_dispatch:
  schedule:
    - cron: '37 1,6 * * 1-5'

# 核心新增：显式声明权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          # 显式使用令牌
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Engine
        run: python main.py

      - name: Force Sync to Repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "AlphaBot"
          git config --global user.email "bot@strategy10.com"
          git add index.xlsx
          # 只有在有变动时才提交，防止死循环
          git commit -m "Auto-Update: V10 [$(date)]" || exit 0
          git push
