name: Strategy-V10-Engine

on:
  workflow_dispatch:
  schedule:
    - cron: '35 1,6 * * 1-5'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        # 深入思考：直接在此处强制安装所有链路库，确保环境 100% 闭环
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy openpyxl

      - name: Run 10.0 Strategy Engine
        # 运行你那套已经适配了“雅虎穿透链路”的 main.py
        run: python main.py

      - name: Sync Results to Repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "AlphaBot"
          git config --global user.email "bot@strategy10.com"
          if [ -f index.xlsx ]; then
            git add index.xlsx
            git commit -m "Auto-Update: V10 Yahoo-Link [$(date)]" || exit 0
            git push
          else
            echo "错误：index.xlsx 未产出，请检查 main.py 逻辑。"
            exit 1
          fi
