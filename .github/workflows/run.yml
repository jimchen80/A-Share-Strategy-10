name: Strategy-V10-Engine
on:
  workflow_dispatch:
  schedule:
    - cron: '35 1,6 * * 1-5' # 北京时间 09:35 和 14:35
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install -r requirements.txt
      - name: Run Engine
        run: python main.py
      - name: Force Sync to Repo
        run: |
          git config --global user.name "AlphaBot"
          git config --global user.email "bot@alpha.com"
          # 只有发现 index.xlsx 且该文件确实产生变化时才推送
          git add index.xlsx
          git commit -m "Auto-Update: V10 [$(date)]" || exit 0
          git push
